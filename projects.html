<script>
document.addEventListener('DOMContentLoaded', function () {
    var i = 0
    var txt = 'print("hello world!")'   
    var speed = 100 
    var el = document.querySelector('.typewriter'); // select class

    function typeWriter() {
        if (i < txt.length) {
            el.textContent += txt.charAt(i);
            i++;
            setTimeout(typeWriter, speed);
        }
    }

    typeWriter();
});
</script>
